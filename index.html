<script>
// QUESTA È LA PARTE CHE SI BLOCCAVA. L'HO RISCRITTA COMPLETAMENTE PER ESSERE SICURO.
async function askAI() {
    const input = document.getElementById('chat-input');
    const prompt = input ? input.value.trim() : "";
    if(!prompt) return;
    
    addChatMsg(prompt,'user');
    input.value = '';
    
    const chatMsgs = document.getElementById('chat-msgs');
    const loading = document.createElement('div');
    loading.className = 'chat-msg bot loading-msg';
    loading.innerHTML = '<div class="ai-loading">...</div>';
    chatMsgs.appendChild(loading);
    
    try {
        const { data, error } = await supabase.functions.invoke('chat-ai', {
            body: { message: prompt }
        });
        if (error) throw error;
        if (loading) loading.remove();
        const text = data.content?.find(b=>b.type==='text')?.text || 'Riprova più tardi.';
        addChatMsg(text,'bot');
    } catch(e) {
        if (loading) loading.remove();
        // NOTA: Qui ho usato le virgolette doppie "" per l'apostrofo
        addChatMsg("L'AI funziona solo online su GitHub Pages. In locale è bloccata.", "bot");
    }
}

// Forza la chiusura del caricamento se dopo 5 secondi non è successo nulla
setTimeout(() => {
    const loader = document.getElementById('initial-loader');
    if (loader) {
        loader.style.display = 'none';
        console.log("Il caricamento è stato forzato alla chiusura per sicurezza.");
    }
}, 5000);
</script>
</body>
